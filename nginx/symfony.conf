server {
    listen 80;
    server_name localhost;

    # Dossier public Symfony
    root /var/www/symfony/public;
    index index.php;

    # Logs
    access_log /var/log/nginx/symfony_access.log;
    error_log  /var/log/nginx/symfony_error.log;

    location / {
        # Toutes les requêtes sont redirigées vers index.php (Front Controller)
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        # Transmission à PHP-FPM
        fastcgi_pass php_symfony:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Empêche l'accès direct aux autres fichiers .php
        internal;
    }

    # Bloquer l'accès aux autres fichiers .php
    location ~ \.php$ {
        return 404;
    }
}